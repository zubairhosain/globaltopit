<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zubair Website</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="Your-paragraph-text.png">

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    background:url("4k-new-york.jpg") no-repeat center center fixed;
    background-size:cover;
}

/* OVERLAY */
.overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.55);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    border-bottom:2px solid white;
}

.logo{
    border:1px solid white;
    padding:6px 10px;
    font-weight:bold;
}

.title{
    font-size:20px;
    font-weight:bold;
}

/* MENU */
.menu{
    display:flex;
    gap:12px;
    padding:12px 40px;
    border-bottom:1px solid white;
    flex-wrap:wrap;
}

.menu a{
    color:white;
    text-decoration:none;
    border:1px solid white;
    padding:6px 12px;
}

.menu a:hover{
    background:white;
    color:black;
}

/* HERO */
.hero{
    text-align:center;
    margin-top:25px;
}

.hero img{
    width:280px;
    border:2px solid white;
    border-radius:8px;
}

/* CONTENT */
.content{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:20px;
    padding:30px 40px;
}

.box{
    border:1px solid white;
    padding:15px;
    background:rgba(0,0,0,0.4);
    border-radius:6px;
}

.box h3{
    border-bottom:1px solid white;
    padding-bottom:6px;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:15px;
    border-top:1px solid white;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="overlay">

    <div class="header">
        <div class="logo">ZB</div>
        <div class="title">Zubair Office Website</div>
    </div>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">iPhone</a>
        <a href="#">Social Media</a>
        <a href="#">Bank</a>
        <a href="#">Email</a>
    </div>

    <div class="hero">
        <img src="Your-paragraph-text.png" alt="post">
    </div>

    <div class="content">

        <div class="box">
            <h3>iPhone Posts</h3>
            <p>Latest iPhone content</p>
        </div>

        <div class="box">
            <h3>Social Media</h3>
            <p>Facebook, Instagram, TikTok</p>
        </div>

        <div class="box">
            <h3>Bank Accounts</h3>
            <p>All bank info here</p>
        </div>

        <div class="box">
            <h3>Email</h3>
            <p>example@gmail.com</p>
        </div>

    </div>

    <div class="footer">
        © 2026 Zubair Website
    </div>

</div>

</body>
</html>
