<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Top It</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* =========================
   🔵 FLEX CONTROL SYSTEM
   ========================= */

/* left / center / right control */
.row{
display:flex;
align-items:center;
}

.space-between{justify-content:space-between;}
.flex-start{justify-content:flex-start;}
.flex-end{justify-content:flex-end;}
.center{justify-content:center;}

/* spacing control */
.gap-10{gap:10px;}
.gap-20{gap:20px;}
.gap-30{gap:30px;}

.px-50{padding:0 50px;}
.px-100{padding:0 100px;}
.px-150{padding:0 150px;}

.py-10{padding:10px 0;}
.py-20{padding:20px 0;}
.py-30{padding:30px 0;}

/* =========================
   TOP BAR
   ========================= */

.top-bar{
background:#0066cc;
color:#fff;
font-size:15px;
}

/* NAVBAR */
.navbar{
background:#fff;
border-bottom:1px solid #eee;
}

/* LOGO */
.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-area img{
width:45px;
height:45px;
}

.logo-area h2{
font-size:22px;
font-weight:500;
}

/* MENU */
.menu{
display:flex;
align-items:center;
gap:25px;
}

.menu a{
text-decoration:none;
color:#111;
font-weight:600;
}

.menu a:hover{
color:#0066cc;
}

/* CART */
.menu a img{
height:28px;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:60px 20px;
background:url('4k-new-york.jpg') center/cover no-repeat;
position:relative;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,80,180,0.55);
}

.hero-content{
position:relative;
z-index:2;
max-width:800px;
color:#fff;
}

.hero h1{font-size:55px;}
.hero p{font-size:18px; margin-top:10px;}
.btn{
margin-top:20px;
padding:12px 25px;
background:#ff00aa;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
.hero h1{font-size:35px;}
}
</style>
</head>

<body>

<!-- 🔵 TOP BAR -->
<div class="top-bar row space-between px-100 py-20">

    <div>
        Trusted Global Service with Verified USA Accounts
    </div>

    <div class="row gap-20">
        <a href="https://t.me/smmpvaexpertts" style="color:#fff; text-decoration:none;">
            Telegram: @GlobalTopIt
        </a>

        <span>Email: Globaltopit@gmail.com</span>
    </div>

</div>

<!-- NAVBAR -->
<nav class="navbar row space-between px-100 py-20">

    <div class="logo-area">
        <img src="Your-paragraph-text.png">
        <h2>GLOBAL TOP IT 🌐</h2>
    </div>

    <div class="menu">

        <a href="#">Home</a>
        <a href="#">Bank Accounts ⌵</a>
        <a href="#">Crypto Accounts ⌵</a>
        <a href="#">Social Accounts ⌵</a>
        <a href="#">Shop</a>

        <a href="/cart" style="position:relative;">
            <img src="add-to-cart.png">

            <span style="
                position:absolute;
                top:-6px;
                right:-8px;
                background:#0066cc;
                color:#fff;
                font-size:10px;
                width:16px;
                height:16px;
                display:flex;
                align-items:center;
                justify-content:center;
                border-radius:50%;
            ">
                0
            </span>
        </a>

    </div>

</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1>Welcome To Global Top It</h1>
        <p>Secure digital services worldwide with trusted support and verified accounts.</p>
        <button class="btn">VISIT SHOP</button>
    </div>
</section>

</body>
</html>
