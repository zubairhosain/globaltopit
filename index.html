<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Top It</title>

<link rel="icon" href="Your-paragraph-text.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#fff;
color:#000;
}

/* TOP BAR */
.top-bar{
background:#0066cc;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 60px;
font-size:14px;
color:#fff;
flex-wrap:wrap;
}

.top-right{
display:flex;
gap:20px;
align-items:center;
}

.top-bar a{
color:#fff;
text-decoration:none;
}

/* NAVBAR */
.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 60px;
border-bottom:1px solid #ddd;
flex-wrap:wrap;
}

/* LOGO */
.logo-area{
display:flex;
align-items:center;
gap:10px;
}

.logo-area img{
width:45px;
height:45px;
object-fit:contain;
}

/* MENU */
.menu{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.menu a{
text-decoration:none;
color:#000;
font-weight:600;
}

.menu a:hover{
color:#0066cc;
}

/* CART */
.cart{
position:relative;
}

.cart img{
width:40px;
height:auto;
cursor:pointer;
}

/* HERO */
.hero{
min-height:85vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
background:url('4k-new-york.jpg') center/cover no-repeat;
position:relative;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,80,180,0.55);
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
color:#fff;
}

.hero h1{
font-size:50px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
margin-bottom:20px;
}

.btn{
padding:12px 25px;
background:#ff00aa;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn:hover{
background:#d6008a;
}

/* RESPONSIVE */
@media(max-width:768px){
.navbar{
flex-direction:column;
gap:15px;
}

.top-bar{
flex-direction:column;
text-align:center;
}
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
<div>Trusted Global Service with Verified Accounts</div>

<div class="top-right">
<a href="https://t.me/smmpvaexpertts">Telegram</a>
<span>Globaltopit@gmail.com</span>
</div>
</div>

<!-- NAVBAR -->
<nav class="navbar">

<div class="logo-area">
<img src="Your-paragraph-text.png">
<h2>GLOBAL TOP IT 🌐</h2>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Bank Accounts ⌵</a>
<a href="#">Crypto Accounts ⌵</a>
<a href="#">Social Accounts ⌵</a>
<a href="#">Shop</a>
</div>

<!-- CART (SEPARATE) -->
<div class="cart">
<img src="add-to-cart.png" alt="Cart">
</div>

</nav>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>Welcome To Global Top It</h1>
<p>Secure digital services worldwide with trusted support.</p>
<button class="btn">VISIT SHOP</button>
</div>
</section>

</body>
</html>
