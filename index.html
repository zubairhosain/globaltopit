<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Germany Top It</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="Your-paragraph-text.png">
<link rel="shortcut icon" href="Your-paragraph-text.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* BODY */
body{
background:#000;
color:white;
}

/* TOP BAR */
.top-bar{
background:#0066cc;
padding:10px 50px;
display:flex;
justify-content:flex-end;
gap:30px;
font-size:14px;
}

/* NAVBAR */
.navbar{
background:#fff;
height:85px;
display:flex;
align-items:center;
padding:0 60px;
}

/* LOGO AREA (slightly right) */
.logo-area{
display:flex;
align-items:center;
gap:15px;
margin-left:20px;
}

.logo-area img{
width:55px;
height:55px;
object-fit:contain;
}

.logo-area h2{
color:#111;
font-size:28px;
font-weight:bold;
}

/* MENU (right aligned) */
.menu{
display:flex;
gap:35px;
margin-left:auto;
margin-right:40px;
}

.menu a{
text-decoration:none;
color:#111;
font-weight:600;
transition:0.3s;
}

.menu a:hover{
color:#0066cc;
}

/* HERO */
.hero{
height:700px;
background:
linear-gradient(rgba(0,80,180,.75),rgba(0,80,180,.75)),
url('4k-new-york.jpg');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 90px;
}

.hero-text{
width:50%;
}

.hero-text h1{
font-size:65px;
font-weight:bold;
margin-bottom:20px;
}

.hero-text p{
font-size:18px;
line-height:1.8;
max-width:700px;
margin-bottom:30px;
}

.btn{
background:#ff00aa;
color:#fff;
padding:15px 35px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

/* COUNTER */
.counter{
margin-top:40px;
display:flex;
gap:15px;
}

.box{
background:rgba(255,255,255,.15);
padding:20px;
width:120px;
text-align:center;
border-radius:8px;
backdrop-filter:blur(5px);
}

.box h3{
font-size:32px;
}

/* HERO IMAGE */
.hero-image{
width:40%;
text-align:center;
}

.hero-image img{
width:100%;
max-width:500px;
}

/* SERVICES */
.services{
background:#fff;
color:#111;
padding:80px 30px;
text-align:center;
}

.services h2{
font-size:45px;
margin-bottom:40px;
color:#0066cc;
}

.service-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
max-width:1200px;
margin:auto;
}

.card{
padding:25px;
border:1px solid #ddd;
border-radius:10px;
}

/* FOOTER */
footer{
background:#111;
padding:25px;
text-align:center;
}

/* RESPONSIVE */
@media(max-width:900px){

.hero{
flex-direction:column;
height:auto;
padding:60px 25px;
}

.hero-text,
.hero-image{
width:100%;
text-align:center;
}

.hero-text h1{
font-size:45px;
}

.counter{
justify-content:center;
flex-wrap:wrap;
}

.service-grid{
grid-template-columns:1fr;
}

.navbar{
flex-direction:column;
height:auto;
padding:20px;
}

.menu{
margin-top:15px;
flex-wrap:wrap;
justify-content:center;
margin-left:0;
margin-right:0;
}

.logo-area{
margin-left:0;
justify-content:center;
}
}
</style>
</head>

<body>

<div class="top-bar">

<span>Email: germanytopit@gmail.com</span>
</div>
