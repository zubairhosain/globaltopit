<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Germany Top It</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:white;
}

/* TOP BAR */
.top-bar{
background:#0066cc;
padding:10px 50px;
display:flex;
justify-content:flex-end;
gap:30px;
font-size:14px;
}

/* NAVBAR */
.navbar{
background:#fff;
height:85px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 60px;
}

/* LEFT LOGO */
.logo-area{
display:flex;
align-items:center;
gap:15px;
}

.logo-area img{
width:55px;
height:55px;
object-fit:contain;
}

.logo-area h2{
color:#111;
font-size:28px;
font-weight:bold;
}

/* MENU RIGHT SIDE */
.menu{
display:flex;
gap:35px;
}

.menu a{
text-decoration:none;
color:#111;
font-weight:600;
}

.menu a:hover{
color:#0066cc;
}

/* HERO (ONLY TEXT NOW, NO IMAGE) */
.hero{
height:700px;
background:
linear-gradient(rgba(0,80,180,.75),rgba(0,80,180,.75)),
url('4k-new-york.jpg');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
padding:0 90px;
text-align:center;
}

/* HERO TEXT */
.hero-text h1{
font-size:65px;
font-weight:bold;
margin-bottom:20px;
}

.hero-text p{
font-size:18px;
line-height:1.8;
max-width:800px;
margin:auto;
margin-bottom:30px;
}

.btn{
background:#ff00aa;
color:#fff;
padding:15px 35px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

/* FOOTER */
footer{
background:#111;
padding:25px;
text-align:center;
font-weight:bold;
}

@media(max-width:900px){

.hero{
padding:60px 25px;
height:auto;
}

.hero-text h1{
font-size:40px;
}

.navbar{
flex-direction:column;
height:auto;
padding:20px;
}

.menu{
margin-top:15px;
flex-wrap:wrap;
justify-content:center;
}

}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
<span>Telegram: Germany Top It</span>
<span>Email: germanytopit@gmail.com</span>
</div>

<!-- NAVBAR -->
<nav class="navbar">

<!-- LEFT LOGO + NAME -->
<div class="logo-area">
<img src="logo.png" alt="Logo">
<h2>Germany Top It</h2>
</div>

<!-- RIGHT MENU -->
<div class="menu">
<a href="#">Home</a>
<a href="#">Bank Accounts</a>
<a href="#">Crypto Accounts</a>
<a href="#">Social Accounts</a>
<a href="#">Shop</a>
</div>

</nav>

<!-- HERO (NO RIGHT IMAGE ANYMORE) -->
<section class="hero">

<div class="hero-text">

<h1>Welcome To Germany Top It</h1>

<p>
Need verified social, bank, and crypto accounts with secure service worldwide.
</p>

<button class="btn">VISIT SHOP</button>

</div>

</section>

<!-- FOOTER -->
<footer>
Telegram: Germany Top It | Email: germanytopit@gmail.com
</footer>

</body>
</html>
