<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Top It</title>

<link rel="icon" href="Your-paragraph-text.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#fff;
color:#000;
}

/* TOP BAR */
.top-bar{
background:#0066cc;
display:flex;
justify-content:flex-end;
gap:25px;
padding:20px 250px;
font-size:16px;
}

.top-bar span{
color:#fff;
font-weight:700;
}

/* NAVBAR */
.navbar{
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 10px;
border:6px solid white;
}

/* LOGO */
.logo-area{
display:flex;
align-items:center;
gap:10px;
}

.logo-area img{
width:50px;
height:50px;
object-fit:contain;
}

.logo-area h2{
font-size:28px;
font-weight:400;
}

/* MENU */
.menu{
display:flex;
gap:25px;
align-items:center;
}

/* LINKS */
.menu a{
text-decoration:none;
color:#111;
font-weight:600;
}

.menu a:hover{
color:#0066cc;
}

/* CART */
.cart{
display:flex;
align-items:center;
}

.cart img{
width:35px;
height:auto;
cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div>Trusted Global Service with Verified USA Accounts</div>

    <div style="display:flex; gap:20px; align-items:center;">
        <span>📧 Globaltopit@gmail.com</span>
        <a href="https://t.me/smmpvaexpertts" style="color:white; text-decoration:none;">Telegram</a>
    </div>
</div>

<!-- NAVBAR -->
<nav class="navbar">

<!-- LOGO -->
<div class="logo-area">
    <img src="Your-paragraph-text.png" alt="logo">
    <h2>GLOBAL TOP IT 🌐</h2>
</div>

<!-- MENU + CART -->
<div class="menu">
    <a href="#">Home</a>
    <a href="#">Bank Accounts ⌵</a>
    <a href="#">Crypto Accounts ⌵</a>
    <a href="#">Social Accounts ⌵</a>
    <a href="#">Shop</a>

    <!-- CART (Shop এর পাশে) -->
    <div class="cart">
        <img src="add-to-cart.png" alt="Cart">
    </div>

</div>

</nav>

<!-- HERO -->
<section style="min-height:85vh; display:flex; align-items:center; justify-content:center; text-align:center; position:relative; background:url('4k-new-york.jpg') center/cover no-repeat;">

<!-- overlay -->
<div style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,80,180,0.55);"></div>

<div style="position:relative; color:#fff;">
    <h1 style="font-size:50px;">Welcome To Global Top It</h1>
    <p style="font-size:18px; margin:15px 0;">Secure digital services worldwide with trusted support.</p>
    <button style="padding:12px 25px; background:#ff00aa; color:#fff; border:none; border-radius:6px;">VISIT SHOP</button>
</div>

</section>

</body>
</html>
