<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Germany Top It</title>

<link rel="icon" type="image/png" href="Your-paragraph-text.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:#fff;
}

/* TOP BAR */
.top-bar{
background:#0066cc;
display:flex;
justify-content:flex-end;
gap:25px;
padding:10px 40px;
font-size:14px;
}

/* NAVBAR */
.navbar{
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
}

/* LOGO */
.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-area img{
width:50px;
height:50px;
object-fit:contain;
}

.logo-area h2{
color:#111;
font-size:24px;
}

/* MENU */
.menu{
display:flex;
gap:25px;
}

.menu a{
text-decoration:none;
color:#111;
font-weight:600;
}

.menu a:hover{
color:#0066cc;
}

/* HERO */
.hero{
min-height:600px;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('4k-new-york.jpg');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:45px;
margin-bottom:15px;
}

.hero p{
max-width:700px;
margin:auto;
font-size:18px;
margin-bottom:20px;
}

.btn{
padding:12px 25px;
border:none;
background:#ff00aa;
color:#fff;
border-radius:6px;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
.navbar{
flex-direction:column;
gap:15px;
}

.menu{
flex-wrap:wrap;
justify-content:center;
}
}
</style>
</head>

<body>

<div class="top-bar">
<span>Telegram: @GermanyTopIt</span>
<span>Email: germanytopit@gmail.com</span>
</div>

<nav class="navbar">

<div class="logo-area">
<img src="Your-paragraph-text.png" alt="">
<h2>Germany Top It</h2>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Bank Accounts</a>
<a href="#">Crypto Accounts</a>
<a href="#">Social Accounts</a>
<a href="#">Shop</a>
</div>

</nav>

<section class="hero">
<div>
<h1>Welcome To Germany Top It</h1>
<p>Secure digital services worldwide including accounts and online solutions.</p>
<button class="btn">VISIT SHOP</button>
</div>
</section>

</body>
</html>
