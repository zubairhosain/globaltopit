<!DOCTYPE html>
<html>
<head>
  <title>Germany Top It</title>

  <link rel="icon" type="image/png" href="Your-paragraph-text.png">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: url("4k-new-york.jpg") center/cover no-repeat;
    }

    /* OVERLAY */
    .overlay {
      background: rgba(0,0,0,0.65);
      min-height: 100vh;
      padding: 20px;
      color: white;
    }

    /* HEADER (LEFT + RIGHT) */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
    }

    /* LEFT SIDE */
    .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .left img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid white;
    }

    .site-info {
      text-align: left;
    }

    .site-info h2 {
      margin: 0;
      font-size: 20px;
    }

    .site-info p {
      margin: 2px 0 0;
      font-size: 14px;
      opacity: 0.8;
    }

    /* MAIN BORDER BOX */
    .main-box {
      width: 92%;
      margin: 20px auto;
      border: 3px solid white;
      border-radius: 15px;
      padding: 15px;
      background: rgba(0,0,0,0.45);
    }

    /* MENU (RIGHT SIDE STYLE) */
    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 15px;
      border-bottom: 1px solid white;
      padding-bottom: 15px;
      margin-bottom: 20px;
    }

    .menu button {
      padding: 12px 20px;   /* 🔥 bigger buttons */
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      color: black;
      font-weight: bold;
      font-size: 15px;
      transition: 0.3s;
    }

    .menu button:hover {
      background: #ddd;
    }

    /* CONTENT BOX */
    .box {
      display: none;
      background: white;
      color: black;
      width: 90%;
      margin: 10px auto;
      padding: 12px;
      border-radius: 10px;
    }

    /* HOME DEFAULT */
    #home {
      display: block;
    }
  </style>
</head>

<body>

<div class="overlay">

  <!-- HEADER -->
  <div class="header">

    <!-- LEFT SIDE -->
    <div class="left">
      <img src="Your-paragraph-text.png">
      <div class="site-info">
        <h2>Germany Top It</h2>
        <p>Owner: MD.ZUBAIR HOSSAIN</p>
      </div>
    </div>

  </div>

  <!-- MAIN BOX -->
  <div class="main-box">

    <!-- MENU (RIGHT) -->
    <div class="menu">
      <button onclick="show('home')">Home</button>
      <button onclick="show('bank')">Bank</button>
      <button onclick="show('crypto')">Crypto</button>
      <button onclick="show('social')">Social</button>
      <button onclick="show('email')">Email</button>
      <button onclick="show('review')">Review</button>
    </div>

    <!-- CONTENT -->
    <div id="home" class="box">
      Welcome to Home Page 🚀
    </div>

    <div id="bank" class="box">
      Bank Accounts Section 🏦
    </div>

    <div id="crypto" class="box">
      Crypto Accounts Section 💰
    </div>

    <div id="social" class="box">
      Social Media Accounts 📱
    </div>

    <div id="email" class="box">
      Email Accounts 📧
    </div>

    <div id="review" class="box">
      Review Section ⭐
    </div>

  </div>

</div>

<script>
function show(id){
  let boxes = document.querySelectorAll(".box");
  boxes.forEach(b => b.style.display = "none");
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
