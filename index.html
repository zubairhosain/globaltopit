<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website</title>

<link rel="icon" href="Your-paragraph-text.png">

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    background:url("4k-new-york.jpg") no-repeat center center fixed;
    background-size:cover;
}

.overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.55);
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    padding:15px 30px;
    border-bottom:2px solid white;
}

.logo img{
    width:45px;
    height:45px;
    border-radius:6px;
    display:block;
}

/* HERO */
.hero{
    text-align:center;
    margin-top:25px;
}

.hero img{
    width:250px;
    border:2px solid white;
    border-radius:10px;
}

/* CARDS */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    border:1px solid white;
    padding:15px;
    background:rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<div class="overlay">

    <!-- LOGO -->
    <div class="header">
        <div class="logo">
            <img src="Your-paragraph-text.png" alt="logo">
        </div>
    </div>

    <!-- IMAGE -->
    <div class="hero">
        <img src="Your-paragraph-text.png" alt="post">
    </div>

    <!-- CONTENT -->
    <div class="container">

        <div class="card">
            <h3>Bank Accounts</h3>
            <p>Info here</p>
        </div>

        <div class="card">
            <h3>Social Media</h3>
            <p>Info here</p>
        </div>

    </div>

</div>

</body>
</html>
