<!DOCTYPE html>
<html>
<head>
  <title>Social Media Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;

      /* 🔥 এখানে তোমার 4K background বসাবে */
      background: url("background.jpg") no-repeat center center/cover;
    }

    /* Dark overlay */
    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      color: white;
      text-align: center;
      padding-bottom: 50px;
    }

    /* Header */
    .header {
      padding: 20px;
    }

    .header img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid white;
    }

    .header h1 {
      margin: 10px 0 0;
      font-size: 28px;
    }

    /* Menu buttons */
    .menu {
      margin-top: 20px;
    }

    .menu button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    /* Content box */
    .box {
      display: none;
      background: white;
      color: black;
      width: 300px;
      margin: 20px auto;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="overlay">

  <!-- 🔥 Logo + Name -->
  <div class="header">
    <img src="logo.png" alt="Logo">
    <h1>My Social Website</h1>
  </div>

  <!-- 🔥 Categories -->
  <div class="menu">
    <button onclick="show('facebook')">Facebook</button>
    <button onclick="show('instagram')">Instagram</button>
    <button onclick="show('tiktok')">TikTok</button>
    <button onclick="show('all')">All</button>
  </div>

  <!-- 🔥 Facebook -->
  <div id="facebook" class="box">
    <h3>Facebook Accounts</h3>
    <p>👉 FB Account 1</p>
    <p>👉 FB Account 2</p>
    <p>👉 FB Account 3</p>
  </div>

  <!-- 🔥 Instagram -->
  <div id="instagram" class="box">
    <h3>Instagram Accounts</h3>
    <p>👉 IG Account 1</p>
    <p>👉 IG Account 2</p>
    <p>👉 IG Account 3</p>
  </div>

  <!-- 🔥 TikTok -->
  <div id="tiktok" class="box">
    <h3>TikTok Accounts</h3>
    <p>👉 TT Account 1</p>
    <p>👉 TT Account 2</p>
    <p>👉 TT Account 3</p>
  </div>

</div>

<script>
function show(id) {
  let boxes = document.querySelectorAll(".box");

  if (id === "all") {
    boxes.forEach(b => b.style.display = "block");
  } else {
    boxes.forEach(b => b.style.display = "none");
    document.getElementById(id).style.display = "block";
  }
}
</script>

</body>
</html>
