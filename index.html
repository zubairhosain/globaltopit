<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Top It</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#fff;
}

/* TOP BAR */
.top-bar{
background:#0066cc;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 200px;
color:white;
font-size:15px;
}

.top-caption{
font-weight:700;
font-size:16px;
}

.top-right{
display:flex;
gap:20px;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#fff;
border:5px solid white;
}

.logo-area{
display:flex;
gap:10px;
align-items:center;
}

.logo-area img{
width:45px;
}

.menu{
display:flex;
gap:20px;
align-items:center;
}

.menu a{
text-decoration:none;
color:#000;
font-weight:600;
padding:10px;
}

/* ================= DROPDOWN FIX ================= */

.dropdown{
position:relative;
display:inline-block;
}

.dropdown > a{
display:block;
padding:10px;
}

/* MAIN BOX */
.dropdown-content{
display:none;
position:absolute;
top:100%;
left:0;
margin-top:10px;

min-width:250px;
background:#fff;

border:1px solid #ddd;
z-index:9999;
}

/* REMOVE LINES PROBLEM */
.dropdown-content a{
display:block;
padding:10px;
text-decoration:none;
color:#000;
border-bottom:none;   /* 🔥 removed lines */
}

/* hover */
.dropdown-content a:hover{
background:#f2f2f2;
}

/* KEEP OPEN SAFE */
.dropdown:hover .dropdown-content{
display:block;
}

/* CART */
.cart{
position:relative;
}

.cart img{
width:35px;
}

.cart-count{
position:absolute;
top:-5px;
right:-8px;
background:red;
color:#fff;
width:18px;
height:18px;
border-radius:50%;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

/* HERO */
.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:#eee;
}
</style>
</head>

<body>

<div class="top-bar">
    <div class="top-caption">GLOBAL SECURE USA & DIGITAL SERVICES</div>
    <div class="top-right">@GlobalTopIt | globaltopit@gmail.com</div>
</div>

<nav class="navbar">

<div class="logo-area">
<img src="logo.png">
<h2>GLOBAL TOP IT</h2>
</div>

<div class="menu">

<a href="#">Home</a>

<div class="dropdown">
    <a href="#">Bank Accounts</a>
    <div class="dropdown-content">
        <a href="#">USA Bank</a>
        <a href="#">UK Bank</a>
        <a href="#">Verified Accounts</a>
    </div>
</div>

<div class="dropdown">
    <a href="#">Crypto Accounts</a>
    <div class="dropdown-content">
        <a href="#">Binance</a>
        <a href="#">Coinbase</a>
        <a href="#">Wallets</a>
    </div>
</div>

<div class="dropdown">
    <a href="#">Social Accounts</a>
    <div class="dropdown-content">
        <a href="#">TikTok</a>
        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
    </div>
</div>

<a href="#">Shop</a>

<div class="cart">
🛒 <span class="cart-count">0</span>
</div>

</div>

</nav>

<div class="hero">
<h1>Welcome To Global Top It</h1>
</div>

</body>
</html>
